name: Daily Intelligence Collection

on:
  schedule:
    - cron: '0 */2 * * *' # 每 2 小时运行一次
  workflow_dispatch: # 支持手动触发

jobs:
  collect_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
          npm install

      - name: Run Collection
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: |
          # 运行采集脚本 (这里暂时调用你的核心采集逻辑)
          # 注意：我们需要在 GitHub 环境下模拟数据库或直接生成 JSON
          python src/scripts/collect_all.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/data/rewrite/*.json
          git commit -m "Auto-update intelligence data: $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
          git push
