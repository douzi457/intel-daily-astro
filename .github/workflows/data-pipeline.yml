name: Data Pipeline

on:
  schedule:
    # 每 4 小时运行一次（UTC）
    # 北京时间: 02:00, 06:00, 10:00, 14:00, 18:00, 22:00
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests

      - name: Run Pipeline (collect → crawl → merge → AI score → export JSON)
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          BAIDU_TRANSLATE_APP_ID: ${{ secrets.BAIDU_TRANSLATE_APP_ID }}
          BAIDU_TRANSLATE_SECRET_KEY: ${{ secrets.BAIDU_TRANSLATE_SECRET_KEY }}
        run: python -m pipeline.main

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/rewrite/
          if git diff --staged --quiet; then
            echo "No new data, skipping commit"
          else
            git commit -m "auto: data pipeline $(date +%Y-%m-%d)"
            git push
          fi
