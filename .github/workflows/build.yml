name: Build & Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 22 * * *'      # UTC 22:00 = CST 06:00
  workflow_dispatch:           # 手动触发

# 防止并发
concurrency:
  group: build-deploy
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. 采集数据（无论 push 还是定时，都生成最新数据） ──
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Run data collection
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: python scripts/dashboard_v4.py

      # ── 2. 构建并部署 ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node deps & build
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          npm install
          npm run build
          npx wrangler pages deploy dist/ --project-name=intel-daily-astro --branch=main
