name: Deploy

on:
  workflow_run:
    workflows:
      - "Data Pipeline"
      - "Collect RSS"
    types:
      - completed
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # 仅 workflow_run 成功时执行；手动触发永远执行
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages (via dist push)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/ -f
          if git diff --staged --quiet; then
            echo "No build changes, skipping deploy"
          else
            git commit -m "build: deploy $(date +%Y-%m-%d)"
            git push
          fi
